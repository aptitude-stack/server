info:
  name: Publish Skill v2
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/skills/{{sanity_primary_slug}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{publishToken}}
  body:
    type: json
    data: |-
      {
        "intent": "publish_version",
        "version": "{{sanity_version_2}}",
        "content": {
          "raw_markdown": "# Postman Primary Skill v2\n\nRun `{{runId}}` primary skill version 2 with a larger body for discovery and content checks.\n"
        },
        "metadata": {
          "name": "Postman Primary Skill",
          "description": "Primary sanity skill for collection coverage",
          "tags": ["postman", "sanity", "primary"],
          "headers": {
            "runtime": "python"
          },
          "inputs_schema": {
            "type": "object"
          },
          "outputs_schema": {
            "type": "object"
          },
          "token_estimate": 260,
          "maturity_score": 0.92,
          "security_score": 0.97
        },
        "governance": {
          "trust_tier": "internal",
          "provenance": {
            "repo_url": "https://github.com/example/skills",
            "commit_sha": "2222222222222222222222222222222222222222",
            "tree_path": "skills/postman-primary",
            "publisher_identity": "postman/manual-qa"
          }
        },
        "relationships": {
          "depends_on": [
            {
              "slug": "{{sanity_dependency_slug}}",
              "version": "{{sanity_version_1}}",
              "optional": false,
              "markers": ["linux"]
            }
          ],
          "extends": [
            {
              "slug": "{{sanity_extension_slug}}",
              "version": "{{sanity_version_1}}"
            }
          ],
          "conflicts_with": [
            {
              "slug": "postman.conflict.{{runId}}",
              "version": "9.9.9"
            }
          ],
          "overlaps_with": [
            {
              "slug": "{{sanity_overlap_slug}}",
              "version": "{{sanity_version_1}}"
            }
          ]
        }
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        const requestName = 'Publish Skill v2';
        const resetFlowStarts = new Set(['Healthz', 'Publish Invalid Request']);

        const setDefault = (name, value) => {
          const current = bru.getVar(name);
          if (typeof current === 'undefined' || current === null || current === '') {
            bru.setVar(name, value);
          }
        };

        setDefault('sanity_version_1', '1.0.0');
        setDefault('sanity_version_2', '2.0.0');
        setDefault('negative_missing_version', '9.9.9');
        setDefault('invalid_slug', 'invalid slug');
        setDefault('invalid_version', 'not-a-semver');
        setDefault('sanity_dependency_slug', '');
        setDefault('sanity_extension_slug', '');
        setDefault('sanity_overlap_slug', '');
        setDefault('sanity_primary_slug', '');
        setDefault('negative_invalid_slug', '');
        setDefault('negative_duplicate_slug', '');
        setDefault('negative_missing_slug', '');
        setDefault('sanity_primary_content_digest', '');

        let runId = bru.getVar('runId');

        if (resetFlowStarts.has(requestName) || !runId) {
          runId = `${Date.now()}-${Math.floor(Math.random() * 100000)}`;
          bru.setVar('runId', runId);
          bru.setVar('sanity_dependency_slug', `postman.dep.${runId}`);
          bru.setVar('sanity_extension_slug', `postman.ext.${runId}`);
          bru.setVar('sanity_overlap_slug', `postman.overlap.${runId}`);
          bru.setVar('sanity_primary_slug', `postman.primary.${runId}`);
          bru.setVar('negative_invalid_slug', `postman.invalid.${runId}`);
          bru.setVar('negative_duplicate_slug', `postman.duplicate.${runId}`);
          bru.setVar('negative_missing_slug', `postman.missing.${runId}`);
          bru.setVar('sanity_primary_content_digest', '');
        }
    - type: tests
      code: |-
        const json = res.getBody();

        test('Status is 201', function () {
          expect(res.getStatus()).to.equal(201);
        });

        test('Publish v2 response matches the requested identity', function () {
          expect(json.slug).to.eql(bru.getVar('sanity_primary_slug'));
          expect(json.version).to.eql(bru.getVar('sanity_version_2'));
          expect(json.metadata.name).to.eql('Postman Primary Skill');
          expect(json.lifecycle_status).to.eql('published');
          expect(json.trust_tier).to.eql('internal');
          expect(json.provenance.repo_url).to.eql('https://github.com/example/skills');
          expect(json.provenance.publisher_identity).to.eql('postman/manual-qa');
          expect(json.provenance.trust_context.trust_tier).to.eql('internal');
          expect(json.published_at).to.be.a('string').and.not.empty;
          expect(json).to.not.have.property('relationships');
          expect(json).to.not.have.property('content_download_path');
        });

        bru.runner.setNextRequest(
          res.getStatus() === 201 ? 'Update Skill Version Status' : null,
        );

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
