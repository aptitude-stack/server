info:
  name: Healthz
  type: http
  seq: 1000
http:
  method: GET
  url: '{{baseUrl}}/healthz'
  headers:
  - name: Accept
    value: application/json
runtime:
  scripts:
  - type: before-request
    code: "const requestName = 'Healthz';\nconst resetFlowStarts = new Set(['Healthz',\
      \ 'Publish Invalid Request']);\n\nconst setDefault = (name, value) => {\n  const\
      \ current = bru.getVar(name);\n  if (typeof current === 'undefined' || current\
      \ === null || current === '') {\n    bru.setVar(name, value);\n  }\n};\n\nsetDefault('sanity_version_1',\
      \ '1.0.0');\nsetDefault('sanity_version_2', '2.0.0');\nsetDefault('negative_missing_version',\
      \ '9.9.9');\nsetDefault('invalid_slug', 'invalid slug');\nsetDefault('invalid_version',\
      \ 'not-a-semver');\nsetDefault('sanity_dependency_slug', '');\nsetDefault('sanity_extension_slug',\
      \ '');\nsetDefault('sanity_overlap_slug', '');\nsetDefault('sanity_primary_slug',\
      \ '');\nsetDefault('negative_invalid_slug', '');\nsetDefault('negative_duplicate_slug',\
      \ '');\nsetDefault('negative_missing_slug', '');\nsetDefault('sanity_primary_content_digest',\
      \ '');\n\nlet runId = bru.getVar('runId');\n\nif (resetFlowStarts.has(requestName)\
      \ || !runId) {\n  runId = `${Date.now()}-${Math.floor(Math.random() * 100000)}`;\n\
      \  bru.setVar('runId', runId);\n  bru.setVar('sanity_dependency_slug', `postman.dep.${runId}`);\n\
      \  bru.setVar('sanity_extension_slug', `postman.ext.${runId}`);\n  bru.setVar('sanity_overlap_slug',\
      \ `postman.overlap.${runId}`);\n  bru.setVar('sanity_primary_slug', `postman.primary.${runId}`);\n\
      \  bru.setVar('negative_invalid_slug', `postman.invalid.${runId}`);\n  bru.setVar('negative_duplicate_slug',\
      \ `postman.duplicate.${runId}`);\n  bru.setVar('negative_missing_slug', `postman.missing.${runId}`);\n\
      \  bru.setVar('sanity_primary_content_digest', '');\n}"
  - type: tests
    code: "test('Status is 200', function () {\n  expect(res.getStatus()).to.equal(200);\n\
      });\n\ntest('Healthz payload matches contract', function () {\n  const json\
      \ = res.getBody();\n  expect(json.status).to.eql('ok');\n  expect(json.service).to.be.a('string').and.not.empty;\n\
      \  expect(json.environment).to.be.a('string').and.not.empty;\n});\n\nbru.runner.setNextRequest(res.getStatus()\
      \ === 200 ? 'Metrics' : null);"
settings:
  encodeUrl: true
