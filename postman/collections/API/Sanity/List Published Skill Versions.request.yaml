$kind: http-request
order: 8000

method: GET
url: '{{baseUrl}}/skills/{{sanity_primary_slug}}'

headers:
  - key: Accept
    value: application/json
    description: Request the visible immutable versions for one skill identity
  - key: Authorization
    value: 'Bearer {{readToken}}'
    description: Authenticate with a caller that has the `read` scope

scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const json = pm.response.json();

      pm.test('Status is 200', () => {
        pm.response.to.have.status(200);
      });

      pm.test('Version list returns the visible versions in canonical order', () => {
        pm.expect(json.slug).to.eql(pm.collectionVariables.get('sanity_primary_slug'));
        pm.expect(json.versions).to.be.an('array').and.have.length(2);

        const [currentDefault, deprecatedVersion] = json.versions;

        pm.expect(currentDefault.version).to.eql(pm.collectionVariables.get('sanity_version_1'));
        pm.expect(currentDefault.lifecycle_status).to.eql('published');
        pm.expect(currentDefault.is_current_default).to.eql(true);

        pm.expect(deprecatedVersion.version).to.eql(pm.collectionVariables.get('sanity_version_2'));
        pm.expect(deprecatedVersion.lifecycle_status).to.eql('deprecated');
        pm.expect(deprecatedVersion.trust_tier).to.eql('internal');
        pm.expect(deprecatedVersion.is_current_default).to.eql(false);
      });

      pm.execution.setNextRequest(
        pm.response.code === 200 ? 'Fetch Published Skill Metadata' : null,
      );
